# NooviChat — Docker Compose com monitoramento (Prometheus + Grafana)
# Para: produção com visibilidade de métricas de infra e aplicação
#
# Acesso:
#   Grafana: http://localhost:3001 (admin / senha do .env)
#   Prometheus: http://localhost:9090

version: "3.8"

services:
  # ---- Aplicação (igual ao basic.yml) ----
  noovichat:
    image: nooviai/noovichat:latest
    depends_on: [postgres, redis]
    env_file: .env
    environment:
      RAILS_ENV: production
      PROMETHEUS_ENABLED: "true"
    volumes:
      - uploads:/app/storage
      - logs:/app/log
    networks: [noovichat-net]
    restart: unless-stopped

  sidekiq:
    image: nooviai/noovichat:latest
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on: [noovichat, postgres, redis]
    env_file: .env
    environment:
      RAILS_ENV: production
    networks: [noovichat-net]
    restart: unless-stopped

  postgres:
    image: ankane/pgvector:v0.7.0
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noovichat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: noovichat_production
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [noovichat-net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes: [redis-data:/data]
    networks: [noovichat-net]
    restart: unless-stopped

  waha:
    image: devlikeapro/waha-plus:latest
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WHATSAPP_HOOK_URL: http://noovichat:3000/webhooks/waha
      WHATSAPP_HOOK_EVENTS: message,message.any,session.status
    volumes: [waha-sessions:/app/.sessions]
    networks: [noovichat-net]
    restart: unless-stopped

  # ---- Monitoramento ----
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    ports: ["127.0.0.1:9090:9090"]
    networks: [noovichat-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports: ["127.0.0.1:3001:3000"]
    networks: [noovichat-net]
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)
    networks: [noovichat-net]
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-noovichat}:${POSTGRES_PASSWORD}@postgres:5432/noovichat_production?sslmode=disable"
    networks: [noovichat-net]
    restart: unless-stopped

networks:
  noovichat-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  uploads:
  logs:
  waha-sessions:
  prometheus-data:
  grafana-data:
